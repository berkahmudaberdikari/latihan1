<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojek Online Landing Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .hero { background: url('hero-bg.jpg') no-repeat center center/cover; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; }
        .features, .pricing, .testimonials, .stats, .contact { padding: 50px 20px; }
        .feature, .pricing-item, .testimonial { margin: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        .hero h1 { font-size: 3em; animation: fadeIn 2s; }
        .hero p { font-size: 1.5em; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Add more styles as needed */
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Ojek Online</h1>
        <p>Your reliable ride partner</p>
        <button>Get Started</button>
    </div>

    <div class="features">
        <h2>Our Features</h2>
        <div class="feature">Feature 1</div>
        <div class="feature">Feature 2</div>
        <div class="feature">Feature 3</div>
    </div>

    <div class="pricing">
        <h2>Pricing Plans</h2>
        <div class="pricing-item">Basic Plan</div>
        <div class="pricing-item">Standard Plan</div>
        <div class="pricing-item">Premium Plan</div>
    </div>

    <div class="testimonials">
        <h2>What Our Users Say</h2>
        <div class="testimonial">"Great service!"</div>
        <div class="testimonial">"Fast and convenient!"</div>
    </div>

    <div class="stats">
        <h2>Our Statistics</h2>
        <p>1000+ Satisfied Customers</p>
        <p>500+ Daily Rides</p>
    </div>

    <div class="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
